const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function dec(pw){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:b64(P.s),iterations:600000,hash:"SHA-256"},
    km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(P.i)},key,b64(P.c));
  return new TextDecoder().decode(pt);
}
async function go(pw,fromSaved){
  const err=document.getElementById("err");
  if(!fromSaved)err.textContent="解密中…";
  try{
    const html=await dec(pw);
    sessionStorage.setItem("arena_pw",pw);
    document.open();document.write(html);document.close();
  }catch(e){
    sessionStorage.removeItem("arena_pw");
    if(!fromSaved)err.textContent="密碼錯誤，請再試一次";
  }
}
document.getElementById("f").addEventListener("submit",e=>{
  e.preventDefault();go(document.getElementById("pw").value,false);});
const saved=sessionStorage.getItem("arena_pw");
if(saved)go(saved,true);
